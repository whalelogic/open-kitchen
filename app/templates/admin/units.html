{% extends 'base.html' %}

{% block title %}Manage Units - Admin{% endblock %}

{% block content %}
<h1>Manage Units</h1>

<div class="card">
    <h2>Add New Unit</h2>
    <form method="post" action="{{ url_for('admin.add_unit') }}">
        <div style="display: flex; gap: 1rem; align-items: end;">
            <div class="form-group" style="flex: 2;">
                <label for="name">Unit Name</label>
                <input type="text" name="name" id="name" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="abbreviation">Abbreviation</label>
                <input type="text" name="abbreviation" id="abbreviation">
            </div>
            <button type="submit">Add Unit</button>
        </div>
    </form>
</div>

<div class="card">
    <h2>Existing Units</h2>
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="border-bottom: 2px solid #ddd;">
                <th style="text-align: left; padding: 0.5rem;">Name</th>
                <th style="text-align: left; padding: 0.5rem;">Abbreviation</th>
            </tr>
        </thead>
        <tbody>
        {% for unit in units %}
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 0.5rem;">{{ unit.name }}</td>
                <td style="padding: 0.5rem;">{{ unit.abbreviation }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

<a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Back to Admin</a>
{% endblock %}
